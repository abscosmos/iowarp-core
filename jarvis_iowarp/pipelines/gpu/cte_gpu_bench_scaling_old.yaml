# CTE GPU Benchmark Scaling Study Pipeline
# Purpose: Sweep warp count, I/O size, and block configuration
# Requirements: wrp_cte_gpu_bench executable in PATH, CUDA-capable GPU
#
# Runs multiple configurations to measure how bandwidth scales with:
#   1. Warp count (1 to 64 warps)
#   2. Per-warp I/O size (4KB to 1MB)
#   3. Block layout (same total warps, different block/thread combos)

name: cte_gpu_bench_scaling

pkgs:
  # --- Warp scaling (128KB/warp, 16 iterations) ---
  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: warps_1
    test_case: "putblob_gpu"
    client_blocks: 1
    client_threads: 32
    io_size: "128k"
    iterations: 16

  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: warps_4
    test_case: "putblob_gpu"
    client_blocks: 1
    client_threads: 128
    io_size: "128k"
    iterations: 16

  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: warps_16
    test_case: "putblob_gpu"
    client_blocks: 1
    client_threads: 512
    io_size: "128k"
    iterations: 16

  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: warps_32
    test_case: "putblob_gpu"
    client_blocks: 4
    client_threads: 256
    io_size: "128k"
    iterations: 16

  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: warps_64
    test_case: "putblob_gpu"
    client_blocks: 8
    client_threads: 256
    io_size: "128k"
    iterations: 16

  # --- I/O size scaling (16 warps, 16 iterations) ---
  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: io_4k
    test_case: "putblob_gpu"
    client_blocks: 1
    client_threads: 512
    io_size: "4k"
    iterations: 16

  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: io_64k
    test_case: "putblob_gpu"
    client_blocks: 1
    client_threads: 512
    io_size: "64k"
    iterations: 16

  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: io_256k
    test_case: "putblob_gpu"
    client_blocks: 1
    client_threads: 512
    io_size: "256k"
    iterations: 16

  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: io_1m
    test_case: "putblob_gpu"
    client_blocks: 1
    client_threads: 512
    io_size: "1m"
    iterations: 16

  # --- Block layout (32 warps, 128KB, 16 iterations) ---
  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: layout_2x512
    test_case: "putblob_gpu"
    client_blocks: 2
    client_threads: 512
    io_size: "128k"
    iterations: 16

  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: layout_4x256
    test_case: "putblob_gpu"
    client_blocks: 4
    client_threads: 256
    io_size: "128k"
    iterations: 16

  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: layout_8x128
    test_case: "putblob_gpu"
    client_blocks: 8
    client_threads: 128
    io_size: "128k"
    iterations: 16
