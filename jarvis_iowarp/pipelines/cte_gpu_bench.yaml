# CTE GPU Benchmark Pipeline
# Purpose: Measure GPU-initiated CTE PutBlob throughput
# Requirements: wrp_cte_gpu_bench executable in PATH, CUDA-capable GPU
#
# The benchmark is self-contained — it starts its own Chimaera runtime
# internally. No separate wrp_runtime or wrp_cte service is needed.
#
# Usage:
#   jarvis pipeline create cte_gpu_bench
#   jarvis pipeline run cte_gpu_bench

name: cte_gpu_bench

pkgs:
  # GPU-local path benchmark: 16 warps, 128KB/warp, 16 iterations
  - pkg_type: jarvis_iowarp.wrp_cte_gpu_bench
    pkg_name: gpu_local
    test_case: "putblob_gpu"
    client_blocks: 1
    client_threads: 512
    io_size: "128k"
    iterations: 16
