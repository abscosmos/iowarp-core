# IOWarp Core - CUDA Variant (Delta / GH200)
# CUDA-enabled release build using CMakePresets.json "cuda-delta" preset
#
# Usage: rattler-build build --recipe recipe/ --variant-config variants/cuda.yaml

preset:
  - cuda-delta

cuda_enabled:
  - "ON"
rocm_enabled:
  - "OFF"
mpi_enabled:
  - "OFF"
mpi_impl:
  - nompi
