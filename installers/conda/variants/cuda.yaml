# IOWarp Core - CUDA Variant (Delta / GH200)
# CUDA-enabled release build using CMakePresets.json "cuda-delta" preset
#
# Usage: IOWARP_PRESET=cuda-delta conda build installers/conda-cuda/ -c conda-forge

preset:
  - cuda-delta

cuda_enabled:
  - "ON"
rocm_enabled:
  - "OFF"
mpi_enabled:
  - "OFF"
mpi_impl:
  - nompi
